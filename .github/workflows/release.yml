name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to create release for'
        required: true
        type: string

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: false

      - name: Fetch models
        run: scripts/fetch-models.sh

      - name: Build DMG
        run: scripts/build-dmg.sh

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          files: build/yaprflow.dmg
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
